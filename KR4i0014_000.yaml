body:
  text: 彥周詩話詩文評類提要臣等謹按彥周詩話一卷宋許顗撰顗襄邑人彥周其字也生平始末無可考見觀其與惠洪面論冷齋夜話評李商隱之誤蓋宣和間人猶及見元祐諸老宿故議論多有根柢所盛稱者蘇軾黃庭堅陳師道數人其宗旨可想見也其引司馬光告程子語謂辨正古人説處當兩存之勿加詆訾又謂韓愈齊梁及陳隋衆作等蟬噪語不敢議亦不敢從又謂論道當嚴取人當恕其言皆可取惟譏杜牧赤壁詩為不説社稷存亡惟説二喬不知大喬孫䇿婦小喬周瑜婦二人入魏即是吳亡又以適怨清和解李商隱錦瑟詩亦未為確中多雜以神怪夢幻尤近於小説家言然其間精當之語為多讀者採其菁華去其蕪纇其大旨固猶不詭於正也乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書彥周詩話宋許顗撰詩話者辨句法備古今紀盛德録異事正訛誤也若含譏諷著過惡誚紕繆皆所不取僕少孤苦而嗜書家有魏晉文章及唐詩人集僅三百家又數得奉教聞前輩長者之餘論今書籍散落舊學廢忘其能記憶者因筆識之不忍棄也嗟乎僕豈足言哉人之於詩嗜好去取未始同也強人使同已則不可以已所見以俟後之人烏乎而不可哉詩壯語易苦語難深思自知不可以口舌辨燕燕于飛差池其羽之子于歸逺送於野瞻望弗及泣涕如雨此真可以泣鬼神矣張子野長短句云眼力不知人逺上溪橋去東坡送子由詩云登髙回首坡隴隔惟見烏帽出復沒皆逺紹其意李太白作草創大還詩云髣佛明窗塵死灰同至寂初不曉此語後得李氏鍊丹法云明窗塵丹砂妙藥也老杜北征詩曰微爾人盡非於今國猶活獨以活國許陳元禮何也蓋禍亂既作惟賞罰當則再振否則不可支持矣元禮首議太真國忠輩近乎一言興邦宜得此語儻無此舉雖有李郭不能展用淮陰勝而不驕乃能師李左車最竒特事荆公詩云將軍北面師降虜此事人間久寂寥李廣誅霸陵尉薄於德矣東坡詩云今年定起故將軍未肯説誅霸陵尉用事當如此向背箜篌狀如張箕探手摘弦出聲盧玉川詩云捲却羅袖彈箜篌此語亦未可譏誚司馬溫公嘗語程正叔云辨證古人誤處當兩存之勿加詆訾也韓退之詩云銀燭未銷窗送曙金叉欲醉座添春殊不類其為人乃知能賦梅花不獨宋廣平退之見神仙亦不伏云我能屈曲自世間安能從汝巢神山賦謝自然詩曰童騃無所識作誰氏子詩曰不從而誅未晚耳唯華山女詩頗假借不知何以得此凡作詩若正爾填實謂之點鬼簿亦謂之堆垜死尸能如猩猩毛筆詩曰平生幾輛屐身後五車書又如管城子無食肉相孔方兄有絶交書精妙明密不可加矣當以此語反三隅也詩人寫人物態度至不可移易元微之李娃行云髻鬟峨峨髙一尺門前立地看春風此定為娼婦退之華山女詩云洗粧拭面著冠帔白咽紅頰長眉青此定是女道士東坡作芙蓉城詩亦用長眉青三字云中有一人長眉青炯如微雲淡疏星便有神仙風度季父仲山先大夫同祖弟也讀書精苦作詩有源流昔嘗上書晚以特奏名得一官政和間御製宮詞三百首嘗和進今録一絶於此染指可以知鼎味也其詞曰輕寒慘慘透衾羅玉箭銅壺漏水多常是未明供御服夢回頻問夜如何道君皇帝在睿思殿宣進甚急意謂得美官翌日臺章論列作詩害經旨遂報罷調南劍州順昌縣尉後卒於揚州云先伯父治平四年舉進士第一少從丁寶臣以文字為歐陽文忠公王岐公所稱重其試公生明賦曰依違牽制者既巳去矣則明白洞達者乃其自然此不刋之語也嘗作詠史詩曰天下有誅賞固非君所私太宗泣君集意恐勞臣疑至公一以廢智術相維持哀哉功名士汲汲尚趨時推斯志也雖蹈滄海餓西山可也在熙寧間為荆公薦竟不委曲得貴達然亦為司馬溫公呂獻可呂微仲范堯夫諸公所知元豐七年自都官外郎奔祖父喪卒於黃州東坡解衣賻之有李氏女者字少雲本士族嘗適人夫死無子棄家著道士服往來江淮間僕頃年見之金陵其詩有云幾多栁絮風翻雪無數桃花水浸霞殊無脂澤氣又喜煉丹砂僕亦得其方大抵類魏伯陽法而有銖兩加精詳者也嘗語僕曰我命薄政恐不能成此藥耳後二年再見之其瘦骨立蓋丹未成而少雲已病僕問曰子丹成欲仙乎惟甚瘦則鶴背能勝也笑曰忍相戲邪病中作梅花詩云素艷明寒雪清香任曉風可憐渾似我零落此山中尋卒後檢方書見丹法及此詩録之晦堂心禪師初退黃龍院作詩云不住唐朝寺間為宋地僧生涯三事衲故舊一枝藤乞食隨緣過逢山任意登相逢莫相笑不是嶺南能此詩深靜平實道眼所了非世間文士詩僧所能髣佛也僧義了字廓然本士族鍾離氏事佛慈璣禪師為侍者僕頃年逮見佛慈老人廓然與僕在嵩山遊甚久頗能詩僕愛其兩句云百年休問幾時好萬事不勞明日看不獨喜其語蓋取其學道休歇灑落自在如此東坡作妙喜師寫御容詩美甚美矣然不若丹青引云將軍下筆開生面又云褒公鄂公毛髮動英姿颯爽來酣戰後説畫玉花驄馬而曰至尊含笑催賜金圉人太僕皆惆悵此語微而顯春秋法也李太白詩云玉窗青青下落花花巳落又曰下增之不贅語益竒請紫姑神大抵能作詩然不甚過人舊傳一士人家請之既降偶書院中子弟作雨詩因率爾請賦頃刻書滿紙其警句云簾捲滕王閣盆翻白帝城可喜也近時僧洪覺範頗能詩其題李訴畫像云淮陰北面師廣武其氣豈止吞項羽公得李祐不肯誅便知元濟在掌股此詩當與黔安並驅也頃年僕在長沙相從彌年其他詩亦甚佳如云含風廣殿聞棊響度日長廊轉栁隂頗似文章巨公所作殊不類衲子又善作小詞情思婉約似少遊至如仲殊參寥雖名世皆不能及東坡贈季常詩戒其殺生末云君勿棄此篇嚴詩編杜集謂嚴武也工部集中有武倡和數首又梅花詩云憑仗幽人收艾蒳國香和雨入苔莓艾蒳香名正松上莓苔也出本草及沈氏香譜又紅梅詩云玉人頩頰固多姿頩怒色普更切見神女賦婦人怒則面赤杜詩飯抄雲子白雲子雨也言如雨點爾出荀子雲篇又葛洪丹經用雲子碎雲母也今蜀中有碎礫狀如米粒圓白雲子石也又杜詩云萬里戎王子何年别月支異花開絶域幽蔓匝清池漢使慙空到神農竟不知露翻兼雨打開拆漸離披不曉此詩指何物張騫慙空到又本草不收定非蒲萄也齊梁間樂府詞云護惜加窮袴防間託守宮今日牛羊上空隴當時近前面發紅老杜作麗人行云賜名大國虢與秦其卒曰慎勿近前丞相嗔虢國秦國何預國忠事而近前即嗔邪東坡言老杜似司馬遷蓋深知之司空圖唐末竟能全節自守其詩有緑樹連村暗黃花入麥稀誠可貴重又云四座賔朋兵亂後一川風月笛聲中句法雖可及而意甚委曲鮑明逺松柏篇悲哀曲折其末不以道自釋僕竊恨之明逺行路難壯麗豪放若決江河詩中不可比擬大似賈誼過秦論老杜作曹將軍丹青引云一洗萬古凡馬空東坡觀吳道子畫壁詩云筆所未到氣巳吞吾不得見其畫矣此兩句二公之詩各可以當之李長吉詩云楊花撲帳春雲熱才力絶人逺甚如栁塘春水慢花塢夕陽遲雖為歐陽文忠所稱然不逮長吉之語古人文章不可輕易反復熟讀加意思索庶幾其見之東坡送安惇落第詩云故書不厭百回讀熟讀深思子自知僕嘗以此語銘座右而書諸紳也東坡在海外方盛稱栁栁州詩後嘗有人得罪過海見黎子雲秀才説海外絶無書適渠家有栁文東坡日夕玩味嗟乎雖東坡觀書亦須著意研窮方見用心處邪栁栁州詩東坡云在陶彭澤下韋蘇州上若晨詣超師院讀佛經詩即此語是公論也六朝詩人之詩不可不熟讀如芙蓉露下落楊栁月中疏鍛鍊至此自唐以來無人能及也退之云齊梁及陳隋衆作等蟬噪此語吾不敢議亦不敢從陶彭澤詩顔謝潘陸皆不及者以其平昔所行之事賦之於詩無一點愧辭所以能爾東坡海內詩荆公鍾山詩超然邁倫能追逐李杜陶謝荆公愛看水中影此亦性所好如秋水寫明河迢迢藕花底又桃花詩云晴溝漲春淥周遭俯視紅影移魚舠皆觀其影也其後云攀條弄芳畏晼晚巳見黍雪盤中毛事見家語李邯鄲公作詩格句自三字至九字十一字有五句成篇者盡古今詩之格律足以資詳博不可不知也伯父娶邯鄲孫女嘗聞邯鄲公與小宋飲酒舉一物𨽻僻事以多者為勝飲不勝者他人不敢造席梅聖俞詩句句精鍊如焚香露蓮泣聞磬清鷗邁之類宜乎為歐陽文忠公所稱其他古體若朱絃疏越一唱三歎讀者當以意求之寵嬖曹氏作一日曲為曹氏也孟浩然王摩詰詩自李杜而下當為第一老杜詩云不見古人王右丞又云吾憐孟浩然皆公論也東坡祭栁子玉文郊寒島瘦元輕白俗此語具眼客見詰曰子盛稱白樂天孟東野詩又愛元微之詩而取此語何也僕曰論道當嚴取人當恕此八字東坡論道之語也歐陽文忠公重讀岨崍集詩英辨超然能破萬古毁譽食曹氏詩忠厚愛人可為世訓作詩壓韻是一巧中秋夜月詩押尖字數首之後一婦人詩云蚌胎光透殼犀角暈盈尖又記人作七夕詩押潘尼字衆人竟和無成詩者僕時不曽賦後因讀藏經呼喜鵲為芻尼乃知讀書不厭多寫生之句取其形似故辭多迂弱趙昌畫黃蜀葵東坡作詩云檀心紫成暈翠葉森有芒揣摸刻骨造語壯麗後世莫及杜牧之題桃花夫人廟詩云細腰宮裏露桃新脈脈無言度幾春畢竟息亡緣底事可憐金谷墜樓人僕謂此詩為二十八字史論宣和之初何栗文縝丞相為中書舍人道君皇帝以御畫雙鵲賜之諸公賦詩韓駒子蒼待制時為挍書郎賦詩二章曰君王妙畫出神機弱羽爭巢並占時想見春風鳷鵲觀一雙飛上萬年枝舍人簪筆上蓬山輦路春風從駕還天上飛來兩烏鵲為傳喜色到人間韋蘇州詩云落葉滿空山何處尋行迹東坡用其韻曰寄語庵中人飛空本無迹此非才不逮蓋絶唱不當和也如東坡羅漢贊云空山無人水流花開八字還許人再道否張籍王建樂府宮詞皆傑出所不能追逐李杜者氣不勝耳孟東野詩苦思深逺可愛不可學僕尤嗜愛者長安無緩步一詩蘇大監文饒作鴻溝詩云置俎均牢彘峩冠信沐猴方矜几上肉巳墮幄中籌海嶽歸三尺衣冠閟一丘路人猶指似山下是鴻溝陳無已賦宗室畫詩云滕王蛺蝶江都馬一紙千金不當價又作曽子固挽辭云丘園無起日江漢有東流近世詩人莫及外祖父邵安簡公布衣時上平元昊策又嘗勸仁廟早立太子晚年自樞府出知越州又移知鄆州其薨也岐公作挽辭云被褐曽陳定羌䇿汗青猶著立儲書春風澤國吟箋落夜雨溪堂宴豆疏前輩詩不獨語句精鍊且是著題鄭周卿僕鄉人也公肅右丞之孫能詩一日鄭之他郡而愛妾死作詩云鶴歸空有恨雲散本無心於情念中猶稍自在也後娶熊氏晉如之女丙午丁未年知鄆州中都縣連年與盜賊鏖戰隤然獨存權朝美曽録其功上之後不報今不知消息可憐哉曹景宗探韻得競病字詩云去時兒女啼歸來笳鼓競借問路傍人何如霍去病沈約詩人嗟賞之李衛公作步虛辭云仙家一本無家字女侍董雙成桂殿夜寒吹玉笙曲終却從仙官去萬戶千門空月明河漢女主能鍊顔一本作河漢女玉鍊顔雲駢往往到人間九霄有路去無迹裊裊天風吹珮環嗚呼人傑也哉季父仲山在揚州時事東坡先生聞其教人作詩曰熟讀毛詩國風與離騷曲折盡在是矣僕嘗以為此語大髙後年齒益長乃知東坡先生之善誘也韓退之詩云酩酊馬上知為誰此七字用意哀怨過於痛哭阮步兵醉六十日而停婚雖似智矣然禮法之士憎之如仇幾至於死幸武帝保護之耳而老杜詩云遂令阮籍輩熟醉為身謀此工部善看史書當有解此意者春秋三傳束髙閣獨抱遺經究終始此詩退之稱盧玉川也玉川子春秋傳僕家舊有之今亡矣辭簡而逺得聖人之意為多後世有深於經而見盧傳者當知退之之不妄許人也夢中賦詩往往有之宣和已亥僕在洪州宿城北鄭和叔家夜夢行大路中寒沙沒足其傍皆田苖丘隴一婦人皂衣素裳行田間曰此中無沙易行僕從之不能登婦人援僕手登焉月明如晝彌望皆野田麥苖婦人求詩引僕藉草坐有矮磚臺一上有紙筆僕題詩四句云間花亂草春春有秋鴻社燕年年歸青天露下麥苖濕古道月寒人迹稀拍筆磚上有聲驚覺宛然記憶是嵗大病後亦無他故聨句之盛退之東野李正封也城南聨句云紅皺晒簷瓦黃團挂門衡是説乾棗與瓜蔞讀之猶想見西北村落間氣象征蜀聫句云刑神詫氂旄隂焰颭犀札盡雕刻之功而語仍壯李正封善押韻如從軍聨句押水沙囊涸皆不可及畫山水詩少陵數首後無人可繼者惟荆公觀燕公山水詩前六句差近之東坡煙江疊嶂圖一詩亦差近之退之桃源行云種桃處處皆開花川原逺近蒸紅霞狀花卉之盛古今無人道此語本朝王元之詩可重大抵語迫切而意雍容如身後聲名文集草眼前衣食簿書堆又云澤畔騷人正憔悴道傍山鬼謾􅀈歈大類樂天也玉川子送伯齡詩云努力事干謁我心終不平玉川子在王涯書院中會食不能自别枉陷於禍哀哉柏舟仁人之詩也憂心悄悄愠於羣小簡兮賢者之詩也碩人俁俁公庭萬舞赫如渥赭公言錫爵能容忍如此宜乎賢矣鍾山有一詩云當年睥睨此山阿欲著紅樓貯綺羅今日重來無一事却騎羸馬下坡陀此王雱訐直不為荆公所喜然此詩實可傳也詩有力量猶如弓之鬭力其未挽時不知其難也及其挽之力不及處分寸不可強若出塞曲云落日照大旗馬鳴風蕭蕭鳴笳三四發壯士慘不驕又八哀詩云汝陽讓帝子眉宇真天人虬髯似太宗色映塞外春此等力量不容他人到洪覺範在潭州水西小南臺寺覺範作冷齋夜話有曰詩至李義山為文章一厄僕至此蹙額無語渠再三窮詰僕不得巳曰夕陽無限好只是近黃昏覺範曰我解子意矣即時刪去今印本猶存之蓋巳前傳出者僕年十七嵗時先大夫為江東漕李端叔髙秀實皆父執也適在金陵二公遊蔣山僕雖年少數從杖屨之後在定林説元微之詩引事當有出處屈曲隱奧髙秀實皆能言之僕不覺自失因思古人讀書多出語皆有來處前輩亦讀書多能知之也髙秀實又云元氏艷詩麗而有骨韓渥香奩集麗而無骨時李端叔意喜韓渥詩誦其序云咀五色之靈芝香生九竅咽三危之瑞露美動七情秀實云勸不得也勸不得也李太白詩云問豫何事棲碧山笑而不答心自間桃花流水窅然去别有天地非人間東坡嶺外詩云老父爭看烏角巾應緣曽現宰官身溪邊古路三義口獨立斜陽數過人賀知章呼李白為謫仙人世傳東坡是戒禪師後身僕竊信之白樂天詩云春色辭門栁秋聲到井梧此語未易及誰人把盞慰深憂開自無憀落更愁幸有清溪三百曲不辭相送到黃州南枝北枝春事休榆錢可寄栁帶柔定是沈郎作詩瘦不應春能生許愁此東坡魯直梅詩二首作詩名貌不出者當深考二詩宣和癸卯年僕遊嵩山峻極中院法堂後簷壁間有詩四句云一團茅草亂蓬蓬驀地燒天驀地空爭似滿爐煨棎榾慢騰騰地熱烘烘字畫極草草其傍隸書四字云勿毁此詩寺僧指示僕曰此四字司馬相公親書也嗟乎此言豈有感於公邪又於柱間大字隸書曰旦光頤來其上一字公兄也第三字程正叔也又題壁云登山有道徐行則不困措足於實地則不危皆公隸書林和靖梅詩云疏影橫斜水清淺暗香浮動月黃昏大為歐陽文忠公稱賞大凡和靖集中梅詩最好梅花詩中此兩句尤竒麗東坡和少遊梅詩云西湖處士骨應稿只有此詩君壓倒僕意東坡亦有微意也然和靖詩屬對清切如贈煅藥秀才詩云鵾鵬懶擊三千水龍虎間封六一泥小杜作華清宮詩云雨露偏金穴乾坤入醉鄉如此天下焉得不亂宋顔延之問已與靈運優劣於鮑昭昭曰謝五言如初發芙蓉自然可愛君詩鋪錦列繡亦雕繢滿眼此明逺對面褒貶而人不覺善論詩也特出之韓熙載仕江南每得俸給盡散後房歌姬熙載披衲持鉢就諸姬乞食率以為常東坡以玉帶贈寶覺寶覺酬以舊衲東坡作詩謝之曰病骨難堪玉帶圍鈍根仍落箭鋒機欲教乞食諸姬院故與雲山舊衲衣江南野史亦載韓事與此小異錢希白內翰作擬唐詩百篇備諸家之體自序曰今之所擬不獨其詞至於題目豈欲拋離本集或有事迹斯亦見之本傳故其擬張籍上裴晉公詩曰午橋莊上千竿竹緑野堂中白日春富貴極來惟歎老功名髙後轉輕身嚴更未報皇城裏勝賞時遊洛水濵昨日庭趨三節度淮西曽是執戈人擬古當如此相似方可傳王晉卿得罪外謫後房善歌者名囀春鶯乃東坡所見也亦遂為密縣馬氏所得後晉卿還朝尋訪微知之作詩云佳人巳屬沙吒利義士今無古押衙僕在密縣與馬縉輔遊甚久知之最詳縉輔在其兄處猶見之國色也西清詩話中載此事云過潁昌見之傳誤也李義山詩字字鍛鍊用事婉約仍多近體惟有韓碑詩一首是古體有曰塗抹堯典舜典字點竄清廟生民詩豈立段碑時躁辭邪岑參詩亦自成一家蓋嘗從封常清軍其記西域異事甚多如優鉢羅花歌熱海行古今傳記所不載者也黃魯直愛與郭功父戲謔嘲調雖不當盡信至此如曰公做詩費許多氣力做甚此語切當有益於學詩者不可不知也春水滿四澤夏雲多竒峰秋月揚明輝冬嶺秀孤松此顧長康詩誤編入陶彭澤集中元撰作樹萱録載有人入夫差墓中見白居易張籍李賀杜牧諸人賦詩皆能記憶句法亦各相似最後老杜亦來賦詩記其前四句云紫領寬袍漉酒巾江頭蕭散作間人秋風有意吹蘆葉落日無情下水濵嗟乎若數君子皆不能脫然髙蹈猶為鬼邪殊不可曉也若以為元撰自造此辭則數公之詩尚可庶幾而少陵四句非元所能道也唐時有清逺道士同沈恭子遊虎丘詩曰余本長殷周遭羅厯秦漢計之至唐則二千餘嵗矣顔魯公愛而刻之且有詩曰客有神仙者於兹雅麗傳蓋指為神仙也李衛公追和魯公刻清逺道士詩曰逸人綴清藻前哲留篇翰則逸人指清逺而前哲謂魯公也其後皮日休陸龜蒙輩皆和之仙邪鬼邪則不必問然僕獨深愛其詩中數句云吟眺川之陰步上山之岸山川共澄徹光彩交凌亂白雲蓊欲歸青霧忽消半嗚呼借使非神仙亦一才鬼也天棘蔓青絲洪覺範硬差天棘作顛栁髙秀實云天棘天門冬也當以秀實之言為正顛天聲相近又酷似青絲又江南徐鉉家本云天棘蔓青絲若蔓生如青絲尤見是天門冬秦州詩云無風雲出塞不夜月臨關無風雲動不夜而月當細思之句法至此古今一人而巳杜牧之作赤壁詩云折戟沈沙鐵未消自將磨洗認前朝東風不與周郎便銅雀春深鎖二喬意謂赤壁不能縱火為曹公奪二喬置之銅雀臺上也孫氏霸業繫此一戰社稷存亡生靈塗炭都不問只恐捉了二喬可見措大不識好惡韓退之聽頴師彈琴詩云浮雲栁絮無根蒂天地濶逺隨飛揚此泛聲也謂輕非絲重非朩也喧啾百鳥羣忽見孤鳳皇泛聲中寄指聲也躋攀分寸不可上吟繹聲也失勢一落千丈強順下聲也僕不曉琴聞之善琴者云此數聲最難工自文忠公與東坡論此詩作聽琵琶詩之後後生隨例云云栁下惠則可吾則不可故論之少為退之雪寃黃嗣徽少年時讀書有俊聲不幸為後母訴於官𨽻軍籍王岐公丞相宣籍得之聞其識字使抄書一日觀宋復古郎中所畫山水使子弟賦詩嗣徽亦請賦公頷之頃刻成一絶句曰匣有瑶琴篋有書棲遲猶未卜吾廬主人况是丹青手乞取生涯似畫圖岐公大嗟賞之及問知曲折以故人子奏於朝乞以門客恩澤承務郎特補之命下之日暴卒窮命如此哉王君玉內翰初登第調揚州江都縣令題九曲池詩云越調隋家曲當年亦九成哀音巳亡國廢沼尚留名儀鳳終沈影鳴蛙祇沸聲凄涼不可問落日背蕪城晏元獻閲詩賞歎薦為館職又嘗乞夢於后土祠夜得報云君年二十七官至四品時年正二十七大惡之過嵗乃稍自安後以禮部侍郎樞密直學士致仕未改官制時正四品年七十二云五年不出青門道邂逅尋春此一回忽憶秦州貴公子桃花落盡合歸來此髙秀實城東寄王越州詩羅隱詩云只知事逐眼前過不覺老從頭上來此語殊有味若有人兮坐山楹雲衮兮霞纓秉芳兮欲寄路漫兮難征獨惆悵而狐疑蹇獨立兮忠貞此寒山語雖使屈宋復生不能過也蜀陜路間有溪曰韓溪蕭酇侯追淮陰處也劉涇巨濟題詩一絶云豪傑相從意氣中憐才傾倒獨蕭公後來可是無竒客東閣投名尚不通李義山錦瑟詩曰錦瑟無端五十弦一弦一柱思華年莊生曉夢迷蝴蝶望帝春心托杜鵑滄海月明珠有淚藍田日暖玉生煙此情何待成追憶只是當時已惘然今古樂志云錦瑟之為器也其柱如其弦數其聲有適怨清和又云感怨清和昔令狐楚侍人能彈此四曲詩中四句狀此四曲也章子厚曽疑此詩而趙推官深為説如此老杜詩不可議論亦不必稱讚茍有所得亦不可不記也如唐太宗相者見之云龍鳳之姿天日之表而杜詩云真氣驚戶牖可謂簡而盡又經昭陵詩曰文物多師古朝廷半老儒直辭寧戮辱賢路不﨑嶇太宗智勇英特武定天下而能如此最盛德也古樂府云藁砧今何在言夫也山上復有山言出也何當大刀頭破鏡飛上天言月半當還也王明之在姑蘇嘗有所愛比至京師為岐公丞相強留之逾時作詩云黃金零落大刀頭玉筯歸期畫到秋紅錦寄魚風逆浪碧簫吹鳳月當樓伯勞知我經春别香蠟窺人一夜愁好去渡江千里夢滿天梅雨是蘇州此詩之巧可傳也段成式與溫庭筠雲藍紙詩序曰豫在九江出意造雲藍紙輒分送五十枚其詩曰三十六鱗充使時數番猶得表相思蓋龍八十一鱗鯉三十六鱗也至宋景文詩云君軒結戀蕭蕭馬尺素愁憑六六魚又使六六三十六也南齊羊侃性豪侈舞人張靜婉腰圍一尺六寸能掌上舞唐人作楊栁枝詞云認得羊家靜婉腰後人除却家字只使羊靜婉誤矣元稹微之樂府古題序云詩之為體二十四名賦頌銘贊文誄針詩行詠吟題怨歎篇章操引謡謳歌曲辭調皆詩人六義之餘王筠為沈約作草朩十詠直寫文辭不加篇題約曰此詩指物呈形無假題注東坡作竹𪕋鼠詩模寫肥腯醜濁之態讀之亦足想見風彩漁陽參撾起於禰衡參字音七覽反徐鍇引古歌辭以證此字云邊城晏開漁陽摻黃塵蕭蕭白日暗李義山賦云豈如河畔牛星隔年祗聞一過不及苑中人栁終朝剩得三眠注漢苑中有人形栁一日三起三倒楊炎歌云雪面淡娥天上女鳳簫鸞趐欲飛去玉叉翹碧步無塵楚腰如栁不勝春為元載侍姬瑤英作也五馬事無知者陳正敏云孑孑干旟在浚之都素絲組之良馬五之以謂州長建旟作太守事又漢官儀注駟馬加左驂右騑二千石有左驂以為五馬然前輩楊劉李宋最號知僻事豈不知讀漢官儀注而疑之邪故俱存之不敢以為是以俟後之知者李太白云子夜無歌動君心李義山詩鶯能子夜歌云晉有子夜者善歌非時數也先伯父熙寧九年四月二十七日夜夢至一處榜曰清香館東邊有别院東壁有詩牌云題冀公功德院山東李白其詩曰秋風吹桂子只在此山中待得春風起還應生桂叢桂叢日以滿清香何時斷只為愛清香故號清香館伯父自作記夢一篇書之甚詳嘗記季父説元豐五年自房陵召還一日忽獨言曰清香館自後多不屑世間事或默坐終日人莫敢問其曲折古詩云上山採交藤交藤何首烏也服之令人多欲生子有采采芣苡之意鄭風云伊其相謔贈之以芍藥陸農師説芍藥破血欲其不成子姓耳不知真有此意否季父仲山病中夢至一處泛舟環水皆竒峰可愛賦詩云山色濃如滴湖光平如席風月不相識相逢便相得既寤而言之後數日卒叔父楚若先太父母弟甫壯而亡少時獨不為時學愛榖梁春秋與栁栁州文作詩用事無一言蹈襲者其所著撰號厄竒集自序曰水激之以亂石則有聲麝藏之以􅀢器則馨齊不下者二城田單因而縱兵文獨不待厄而後竒乎兵火間散亂不可復得略記其敘數句以見其措意如此長安慈恩寺有數女仙夜遊題詩云黃子坡頭好月明強踏華筵到曉行煙波山色翠黛橫折得落花還恨生化為白鶴飛去明日又題一首云湖水團團夜如鏡碧樹紅花相掩映北斗闌干移曉柄有似佳期常不定長安南山下一書生作小圃蒔花才一日有犢車麗女來飲於庭邀書生同席既去作詩云相思無路莫相思風裏楊花只片時惆悵深閨獨歸處曉鶯啼斷緑楊枝皆鬼仙詩婉約可愛司馬公諱池仁廟朝待制溫國文正公之父也作行色詩云泠於波水淡於秋逺陌初窮見渡頭賴得丹青無畫處畫成應遣一生愁又黃公諱庶魯直之父作大孤山詩云銀山巨浪獨夫險比干一片崔嵬心人傳溫公家舊有琉璃盞為官奴所碎洛尹怒令糾録聽溫公區處公判云玉爵弗揮典禮雖聞於往記彩雲易散過差宜恕於斯人又魯直作詩用事壓韻皆超妙出人意表蓋其傳襲文章種性如此饒德操為僧號倚松道人名曰如璧作詩有句法苦學副其才情不愧前輩尤善作銘贊古文其作佛米贊謂武將念佛以米記數得三升也將軍念佛難於遣辭而曰時平主聖萬國自靖不殺而武不征而正矯矯虎臣無所用命移將東南介我佛會久聞我曹念佛三昧喑嗚叱吒化為佛聲三令五申易為佛名一佛一米為米三升自升而斗自斗而斛念之無窮大倉不足觀此雖栁子厚曲折不過是矣栁子厚守栁州日築龍城得白石微辨刻畫曰龍城栁神所守驅厲鬼山左首福土氓制九醜此子厚自記也退之作羅池廟碑云福我兮壽我驅厲鬼兮山之左蓋用此事唐髙宗御羣臣宴賞雙頭牡丹詩上官昭容一聨云勢如連璧友情若臭蘭人計之必一英竒女子也東坡受知神廟雖謫而實欲用之東坡微解此意論賈誼謫長沙事蓋自況也後作神廟挽詞云病馬空思櫪枯葵巳泫霜此非深悲至痛不能道此語在元祐間獲鬼章作告裕陵文云將帥用命爭酬未報之恩神靈在天難逃不漏之網後人輒謂東坡以微文謗訕天乎寧有是哉俞秀老紫芝詩有云有時俗事不稱意無限好山都上心雖峭然中實人情也有客泊湘妃廟前夜半偶不寐見輿衛入廟中置酒鼓琴心悸不敢窺殆明方散隱隱絶水浮空去因入廟中見詩四句墨色猶未乾云碧杜紅蘅縹眇香氷絲彈月弄新涼峰巒向曉渾相似九處堪疑九斷腸神怪不足言但詩殊佳故録之錢昭度能詩嘗作呂申公夷簡生日詩云磻溪重得呂維嶽再生申當時詩格律止此然可謂著題也巳朝無咎在崇寧間次李承之長短句以弔承之曰射虎山邊尋舊迹騎􅚪海上追前約便與江湖永相忘還堪樂不獨用事的確其指意髙古深悲而善怨似離騷故特録之韓退之云橫空盤硬語妥貼力排奡蓋能殺縛事實與意義合最難能之知其難則可與論詩矣此所以稱孟東野也楊舜韶友夔長僕十餘嵗向同在姑蘇時盜發孫堅墓楊作詩云闔廬城邊荒古邱昔誰葬者孫豫州久無行客為下馬時有牧童來放牛嗚呼舜韶今亡矣他詩皆工必傳於世也楊華既奔梁元魏胡武靈后作楊白華歌令宮人連臂踏之聲甚凄斷栁子厚樂府云楊白華風吹渡江水坐令宮樹無顔色搖蕩春心幾千里回看落日下長秋哀歌未斷城烏起言婉而情深古今絶唱也魏舊歌云陽春二三月楊栁齊作花春風一夜入閨闥楊花飄落入南家含情出戶腳無力拾得楊花淚沾臆秋去春來雙燕子願銜楊花入窠裏此辭亦自竒麗録之以存古樂府題云風定花猶舞鳥鳴山更幽世傳荆公改舞字作落字其語頓工然風定花猶落乃梁謝貞八嵗時所作春日間居詩也從舅王筠竒之曰追步惠連矣會老堂口號曰金馬玉堂三學士清風明月兩間人初謂清風明月古通用語後讀南史謝譓傳曰入吾室者但有清風對吾飲者惟當明月歐陽文忠公文章雖優辭亦精緻如此老杜衡州詩云悠悠委薄俗鬱鬱回剛腸此語甚悲昔蒯通讀樂毅傳而涕泣後之人亦當有味此而泣者也陳克子髙作贈别詩云淚眼生憎好天色離觴偏觸病心情雖韓渥溫庭筠未嘗措意至此王豐公待制岐公丞相之子少年詞賦登科文章世其家我先伯父狀元實岐公客僕亦獲事待制公世所見者表章序記應用之文耳其詩精密人鮮知者如白髮衰天癸丹砂養地丁意脈貫串尚勝三甲六丁之語此所謂參禪中參活句也又作柱杖詩云老境得為丘壑伴醉鄉還勝子孫扶其風味雍容如此天下有公論僕不敢私豐父嘗與僕言班孟堅兩都賦華壯第一然只是文辭若叔皮北征賦云劇蒙公之疲民兮為強秦而築怨此語不可及僕嘗三復玩味之知前輩觀書自有見處李夫人賦序云帝悲感為作詩曰是邪非邪立而望之偏僕曰因此則退之走馬來看立不正之所祖述也陶彭澤歸去來辭云既自以心為形役奚惆悵而獨悲是此老悟道處若人能用此兩句出處有餘裕也東坡詩不可指摘輕議辭源如長江大河飄沙卷沫枯槎束薪蘭舟繡鷁皆隨流矣珍泉幽澗澄澤靈沼可愛可喜無一點塵滓只是體不似江河讀者幸以此意求之鮮于子駿作九誦東坡大稱之云友屈宋於千載之上觀堯祠舜祠二章氣格髙古自東漢以來鮮及前輩稱贊人略緣實也世間花卉無踰蓮花者蓋諸花皆藉暄風暖日獨蓮花得意於水月其香清涼雖荷葉無花時亦自香也梁江從簡為採荷調云欲持荷作柱荷弱不勝梁欲持荷作鏡荷暗本無光此語嘲何敬容而波及蓮荷矣春時穠麗無過桃栁桃之夭夭楊栁依依詩人言之也老杜云顛狂栁絮隨風去輕薄桃花逐水流不知緣誰而波及桃花與楊栁矣樂府記大言小言詩録昭明辭而不書始於宋玉何也豈誤邪有説邪梁武帝作白紵舞辭四句令沈約改其辭為四時白紵之歌帝辭云朱絃玉柱羅象筵飛管促節舞少年短歌留目未肯前含笑一轉私自憐嗟乎麗矣古今當為第一也作詩淺易鄙陋之氣不除大可惡客問何從去之僕曰熟讀唐李義山詩與本朝黃魯直詩而深思焉則去也客言李杜詩中説馬如相馬經有能過之者乎僕曰毛詩過之曰六經固不可擬然亦未嘗子細説馬相態行步也僕曰願熟讀之兩驂如舞此駔語所謂花踏羊行是也兩驂如手此駔語所謂熟使喚是也思之便覺走過掣電傾城知與神行電邁涉恍惚為難騎耳韓退之元和聖德詩云駕龍十二魚魚雅雅其深於詩者邪裴休題泐潭云泐潭形勝地祖塔在雲湄浩劫有窮日貞風無墜時嵗華空自老消息竟誰知到此輕塵慮功名自可遺詩格律止此然裴參黃蘖其語不誇不怨不怒也孤村芳草逺斜日杏花飛大丞相萊國公冦忠愍之語蜀道觀中鑿井得一碑刻文似賦似贊曰有物有物可大可久採乎蠶食之前用乎火化之後成湯自上而臨下夸父虛中而見受氣應朝光功參夜漏白英聚而雪慙黃酥凝而金醜轉制不巳神趣鬼驟金歟玉歟天年上夀無著於文訣之在口後有隱士言是漢時陰真人所著鍊丹法後雜著於子玉碑僕恨不得其門戶聊復存之彥周詩話
